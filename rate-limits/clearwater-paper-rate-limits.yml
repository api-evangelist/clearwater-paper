specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Clearwater Paper
providerId: clearwater-paper
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Tissue
  - Paperboard
  - Rate Limiting
notes: Clearwater Paper does not publish public API rate limits. Any partner integration limits would
  be defined inside the bilateral contract.
description: No public rate-limit documentation exists. Limits are governed by individual partner / EDI
  agreements.
sources:
  - https://www.clearwaterpaper.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner-contract defined
    scope: account
    metric: varies
    limit: see partner agreement
    notes: Limits are negotiated as part of each partner integration agreement.
policies:
  - name: Backoff strategy
    description: On 429 responses, honor any Retry-After header and back off with jitter before retrying.
  - name: Bilateral contract
    description: Specific limits, retry policy, and SLAs are governed by the partner integration contract.
